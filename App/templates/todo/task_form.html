{% extends "todo/base.html" %}
{% block content %}
  
<h2>{% if task.pk %}Edit Task{% else %}Add {% endif %}Task</h2>
{% if errors %}
<div class="alert alert-danger">{{ errors }}</div>
{% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="tittle" class="form-control" value="{{ task.tittle|default:'' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ task.description|default:'' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Task</button>
    </form>
{% endblock %}
