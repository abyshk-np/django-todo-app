{% extends "todo/base.html" %}
{% block content %}
<h2>All tasks</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Done</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
      {% for task in task %}
        <tr>
            <td>{{ task.tittle }}</td>
            <td>{{ task.description | linebreaks}}</td>
            <td>
                <form method="post" action="{% url 'todo:task_toggle' task.pk %}" style="display:inline;">                    {% csrf_token %}
                    <button type="submit" class="btn  btn-sm {% if task.completed %} btn-secondary {% else %} btn-success {% endif %}">
                        {% if task.completed %}Mark Incomplete{% else %}Mark Complete{% endif %}
                    </button>
                </form>
                {% comment %} <a href="{% url 'todo:task_update' task.pk %}" class="btn btn-primary btn-sm">Edit</a>
                <a href="{% url 'todo:task_delete' task.pk %}" class="btn btn-danger btn-sm">Delete</a> {% endcomment %}
            </td>
            <td>
                <a class ="btn btn-sm btn-warning" href="{% url 'todo:task_update' task.pk %}">Edit</a>
                <a class="btn btn-sm btn-danger" href="{% url 'todo:task_delete' task.pk %}">Delete</a> 
            </td>
        </tr>
        {%empty%}
        <tr>
            <td colspan="3">No tasks found.</td>
        {% endfor %}
    </tbody>
<table>
{% endblock %}
